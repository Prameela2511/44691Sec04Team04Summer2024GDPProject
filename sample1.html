<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Sign Up Form</title>
    <!-- Link to the CSS file -->
    <link rel="stylesheet" type="text/css" href="C:\Users\s567076\Downloads\templatemo_564_plot_listing\sec04team04GDP\assets\css\sample1.css">
</head>
<body>

<div class="cont">
    <div class="form sign-in">
        <h2>Welcome</h2>
        <label>
            <span>Email</span>
            <input type="email" />
        </label>
        <label>
            <span>Password</span>
            <input type="password" />
        </label>
        <p class="forgot-pass">Forgot password?</p>
        <button type="button" class="submit" onclick="redirectToAnotherPage()">Sign In</button>
     
    </div>
    
    <div class="sub-cont">
        <div class="img">
            <div class="img__text m--up">
             
                <h3>Don't have an account? Please Sign up!<h3>
            </div>
            <div class="img__text m--in">
            
                <h3>If you already has an account, just sign in.<h3>
            </div>
            <div class="img__btn">
                <span class="m--up">Sign Up</span>
                <span class="m--in">Sign In</span>
            </div>
        </div>
        <div class="form sign-up">
            <h2>Create your Account</h2>
            <label>
                <span>Name</span>
                <input type="text" />
            </label>
            <label>
                <span>Email</span>
                <input type="email" />
            </label>
            <label>
                <span>Password</span>
                <input type="password" />
            </label>
            <button type="button" class="submit">Sign Up</button>
            
        </div>
    </div>
</div>

<script>
    document.querySelector('.img__btn').addEventListener('click', function() {
        document.querySelector('.cont').classList.toggle('s--signup');
    });
    function redirectToAnotherPage() {
        // You can change the URL to the page you want to navigate to
        window.location.href = "index.html";
    }
    function redirectToSignUpPage() {
        // Navigate to the sign-up page
        window.location.href = "sign-up.html";
    }
</script>

</body>
</html>
